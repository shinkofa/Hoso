<?xml version="1.0" encoding="UTF-8"?>
<svg width="280" height="600" viewBox="0 0 280 600" xmlns="http://www.w3.org/2000/svg"
     font-family="system-ui, -apple-system, 'Segoe UI', Arial, sans-serif">
  <defs>
    <clipPath id="oc-screen">
      <rect x="8" y="8" width="264" height="584" rx="26"/>
    </clipPath>
  </defs>

  <!-- Phone shell -->
  <rect width="280" height="600" rx="32" fill="#0D0D22"/>
  <rect x="1.5" y="1.5" width="277" height="597" rx="30.5" fill="none" stroke="#22224A" stroke-width="1"/>

  <g clip-path="url(#oc-screen)">
    <!-- Game background -->
    <rect x="8" y="8" width="264" height="584" fill="#0C1914"/>

    <!-- Game top HUD bar -->
    <rect x="8" y="8" width="264" height="46" fill="#060E0B" opacity="0.95"/>
    <rect x="113" y="8" width="54" height="20" rx="10" fill="#0D0D22"/>
    <text x="22" y="28" fill="#405060" font-size="10">9:41</text>
    <text x="257" y="28" fill="#405060" font-size="10" text-anchor="end">●●●</text>
    <!-- HP bar -->
    <rect x="18" y="34" width="74" height="8" rx="4" fill="#0E2210"/>
    <rect x="18" y="34" width="56" height="8" rx="4" fill="#22C55E"/>
    <text x="96" y="42" fill="#22C55E" font-size="9">HP 76%</text>
    <!-- MP bar -->
    <rect x="136" y="34" width="64" height="8" rx="4" fill="#0E1022"/>
    <rect x="136" y="34" width="40" height="8" rx="4" fill="#3B82F6"/>
    <text x="204" y="42" fill="#3B82F6" font-size="9">MP 63%</text>

    <!-- Game terrain (dark shapes) -->
    <rect x="22" y="80" width="96" height="64" rx="10" fill="#0A1610" opacity="0.85"/>
    <rect x="152" y="110" width="90" height="56" rx="10" fill="#0A1610" opacity="0.85"/>
    <rect x="42" y="194" width="110" height="74" rx="10" fill="#0A1610" opacity="0.75"/>
    <rect x="168" y="220" width="82" height="68" rx="10" fill="#0A1610" opacity="0.80"/>
    <rect x="70" y="330" width="88" height="60" rx="10" fill="#0A1610" opacity="0.70"/>
    <!-- Player character dot -->
    <circle cx="136" cy="390" r="14" fill="#1E3050" stroke="#3DC3FF" stroke-width="1.5" opacity="0.9"/>
    <circle cx="136" cy="390" r="7" fill="#3DC3FF" opacity="0.7"/>

    <!-- Game bottom skill bar -->
    <rect x="8" y="514" width="264" height="78" fill="#060E0B" opacity="0.96"/>
    <line x1="8" y1="515" x2="272" y2="515" stroke="#183028" stroke-width="1"/>
    <rect x="16" y="524" width="44" height="54" rx="9" fill="#0D1E14" stroke="#1C3022" stroke-width="1"/>
    <rect x="66" y="524" width="44" height="54" rx="9" fill="#0D1E14" stroke="#1C3022" stroke-width="1"/>
    <rect x="116" y="524" width="44" height="54" rx="9" fill="#0D1E14" stroke="#1C3022" stroke-width="1"/>
    <rect x="166" y="524" width="44" height="54" rx="9" fill="#0D1E14" stroke="#1C3022" stroke-width="1"/>
    <rect x="216" y="524" width="44" height="54" rx="9" fill="#0D1E14" stroke="#1C3022" stroke-width="1"/>

    <!-- ── Hoso floating button (collapsed overlay) ── -->
    <!-- Outer glow ring -->
    <circle cx="54" cy="310" r="32" fill="#3DC3FF" opacity="0.06"/>
    <!-- Main circle -->
    <circle cx="54" cy="310" r="26" fill="#0C1830"/>
    <circle cx="54" cy="310" r="26" fill="none" stroke="#3DC3FF" stroke-width="1.5" opacity="0.55"/>
    <!-- Inner circle -->
    <circle cx="54" cy="310" r="18" fill="#111E34"/>
    <!-- Broadcast / streaming icon: 3 arcs -->
    <!-- Innermost dot -->
    <circle cx="54" cy="310" r="3.5" fill="#3DC3FF"/>
    <!-- Arc 1 (small) -->
    <path d="M 46.5 302.5 A 10.6 10.6 0 0 1 61.5 302.5" fill="none" stroke="#3DC3FF" stroke-width="2" stroke-linecap="round" opacity="0.9"/>
    <!-- Arc 2 (medium) -->
    <path d="M 41 297 A 18.4 18.4 0 0 1 67 297" fill="none" stroke="#3DC3FF" stroke-width="1.6" stroke-linecap="round" opacity="0.55"/>

    <!-- Chat pastille (top-right, blue = chat active) -->
    <circle cx="73" cy="288" r="5.5" fill="#3DC3FF"/>
    <circle cx="73" cy="288" r="5.5" fill="none" stroke="#0C1914" stroke-width="1.2"/>


    <!-- Home bar -->
    <rect x="110" y="580" width="60" height="4" rx="2" fill="#1A2244"/>
  </g>
</svg>
