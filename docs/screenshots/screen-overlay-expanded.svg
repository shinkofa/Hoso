<?xml version="1.0" encoding="UTF-8"?>
<svg width="280" height="600" viewBox="0 0 280 600" xmlns="http://www.w3.org/2000/svg"
     font-family="system-ui, -apple-system, 'Segoe UI', Arial, sans-serif">
  <defs>
    <clipPath id="oe-screen">
      <rect x="8" y="8" width="264" height="584" rx="26"/>
    </clipPath>
  </defs>

  <!-- Phone shell -->
  <rect width="280" height="600" rx="32" fill="#0D0D22"/>
  <rect x="1.5" y="1.5" width="277" height="597" rx="30.5" fill="none" stroke="#22224A" stroke-width="1"/>

  <g clip-path="url(#oe-screen)">
    <!-- Game background -->
    <rect x="8" y="8" width="264" height="584" fill="#0C1914"/>

    <!-- Game top HUD bar -->
    <rect x="8" y="8" width="264" height="46" fill="#060E0B" opacity="0.95"/>
    <rect x="113" y="8" width="54" height="20" rx="10" fill="#0D0D22"/>
    <text x="22" y="28" fill="#405060" font-size="10">9:41</text>
    <text x="257" y="28" fill="#405060" font-size="10" text-anchor="end">●●●</text>
    <!-- HP bar -->
    <rect x="18" y="34" width="74" height="8" rx="4" fill="#0E2210"/>
    <rect x="18" y="34" width="56" height="8" rx="4" fill="#22C55E"/>
    <text x="96" y="42" fill="#22C55E" font-size="9">HP 76%</text>
    <!-- MP bar -->
    <rect x="136" y="34" width="64" height="8" rx="4" fill="#0E1022"/>
    <rect x="136" y="34" width="40" height="8" rx="4" fill="#3B82F6"/>
    <text x="204" y="42" fill="#3B82F6" font-size="9">MP 63%</text>

    <!-- Game terrain -->
    <rect x="22" y="80" width="96" height="64" rx="10" fill="#0A1610" opacity="0.80"/>
    <rect x="152" y="110" width="90" height="56" rx="10" fill="#0A1610" opacity="0.80"/>
    <rect x="42" y="200" width="110" height="70" rx="10" fill="#0A1610" opacity="0.70"/>
    <rect x="168" y="230" width="82" height="64" rx="10" fill="#0A1610" opacity="0.75"/>
    <circle cx="136" cy="400" r="14" fill="#1E3050" stroke="#3DC3FF" stroke-width="1.5" opacity="0.85"/>
    <circle cx="136" cy="400" r="7" fill="#3DC3FF" opacity="0.65"/>

    <!-- Game bottom skill bar -->
    <rect x="8" y="514" width="264" height="78" fill="#060E0B" opacity="0.96"/>
    <line x1="8" y1="515" x2="272" y2="515" stroke="#183028" stroke-width="1"/>
    <rect x="16" y="524" width="44" height="54" rx="9" fill="#0D1E14" stroke="#1C3022" stroke-width="1"/>
    <rect x="66" y="524" width="44" height="54" rx="9" fill="#0D1E14" stroke="#1C3022" stroke-width="1"/>
    <rect x="116" y="524" width="44" height="54" rx="9" fill="#0D1E14" stroke="#1C3022" stroke-width="1"/>
    <rect x="166" y="524" width="44" height="54" rx="9" fill="#0D1E14" stroke="#1C3022" stroke-width="1"/>
    <rect x="216" y="524" width="44" height="54" rx="9" fill="#0D1E14" stroke="#1C3022" stroke-width="1"/>

    <!-- ── HUD pill ── -->
    <rect x="12" y="65" width="256" height="30" rx="15" fill="#090F1E" opacity="0.94"/>
    <rect x="12" y="65" width="256" height="30" rx="15" fill="none" stroke="#3DC3FF" stroke-width="0.8" opacity="0.5"/>
    <!-- Live indicator dot -->
    <circle cx="30" cy="80" r="5" fill="#F87171"/>
    <text x="40" y="84" fill="#3DC3FF" font-size="11" font-family="'Courier New', Courier, monospace">00:42:13  ·  4.2 Mbps</text>
    <!-- LIVE badge -->
    <rect x="216" y="69" width="40" height="22" rx="11" fill="#F87171" opacity="0.9"/>
    <text x="236" y="84" fill="#fff" font-size="10" font-weight="700" text-anchor="middle">LIVE</text>

    <!-- ── Controls pill ── -->
    <rect x="12" y="101" width="256" height="62" rx="18" fill="#0C1525" opacity="0.97"/>
    <rect x="12" y="101" width="256" height="62" rx="18" fill="none" stroke="#2A3660" stroke-width="1"/>

    <!-- 6 buttons inside the pill, cy=132 -->
    <!-- [×] Collapse (smaller) -->
    <circle cx="44" cy="132" r="18" fill="#152035"/>
    <line x1="37" y1="125" x2="51" y2="139" stroke="#A0A8C4" stroke-width="2" stroke-linecap="round"/>
    <line x1="51" y1="125" x2="37" y2="139" stroke="#A0A8C4" stroke-width="2" stroke-linecap="round"/>

    <!-- [MIC] Microphone (active = blue) -->
    <circle cx="82" cy="132" r="20" fill="#152035"/>
    <rect x="76" y="120" width="12" height="16" rx="6" fill="#3DC3FF"/>
    <path d="M 72 131 Q 72 142 82 142 Q 92 142 92 131" fill="none" stroke="#3DC3FF" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="82" y1="142" x2="82" y2="148" stroke="#3DC3FF" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="77" y1="148" x2="87" y2="148" stroke="#3DC3FF" stroke-width="1.8" stroke-linecap="round"/>

    <!-- [PRIVACY] Eye icon -->
    <circle cx="122" cy="132" r="20" fill="#152035"/>
    <ellipse cx="122" cy="132" rx="9" ry="5.5" fill="none" stroke="#A0A8C4" stroke-width="1.8"/>
    <circle cx="122" cy="132" r="2.8" fill="#A0A8C4"/>

    <!-- [PAUSE] Two vertical bars -->
    <circle cx="162" cy="132" r="20" fill="#152035"/>
    <rect x="155" y="123" width="5" height="18" rx="2" fill="#A0A8C4"/>
    <rect x="164" y="123" width="5" height="18" rx="2" fill="#A0A8C4"/>

    <!-- [CHAT] Chat bubble -->
    <circle cx="202" cy="132" r="20" fill="#152035"/>
    <rect x="193" y="121" width="18" height="14" rx="4" fill="#A0A8C4"/>
    <polygon points="195,135 192,141 200,135" fill="#A0A8C4"/>

    <!-- [STOP] Red stop button -->
    <circle cx="242" cy="132" r="20" fill="#8B1C1C" opacity="0.85"/>
    <rect x="233" y="123" width="18" height="18" rx="3" fill="#FFD0D0"/>

    <!-- Home bar -->
    <rect x="110" y="580" width="60" height="4" rx="2" fill="#1A2244"/>
  </g>
</svg>
