<?xml version="1.0" encoding="UTF-8"?>
<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     font-family="system-ui, -apple-system, 'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1024"/>
      <stop offset="0.55" stop-color="#0F1729"/>
      <stop offset="1" stop-color="#141C3C"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3DC3FF" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#3DC3FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <ellipse cx="905" cy="335" rx="360" ry="320" fill="url(#glow)"/>
  <!-- faint accent line -->
  <rect x="70" y="150" width="54" height="4" rx="2" fill="#3DC3FF"/>

  <!-- ── Left: branding ── -->
  <image xlink:href="../../Logo-Hoso-fnl.png" x="70" y="64" width="60" height="60"/>
  <text x="146" y="106" fill="#E8EAF0" font-size="30" font-weight="700">Hoso</text>

  <!-- Headline -->
  <text x="70" y="230" fill="#E8EAF0" font-size="42" font-weight="800" letter-spacing="-0.5">Streame ton jeu mobile</text>
  <text x="70" y="284" fill="#E8EAF0" font-size="42" font-weight="800" letter-spacing="-0.5">vers <tspan fill="#3DC3FF">Twitch</tspan>.</text>

  <!-- Subhead -->
  <text x="72" y="338" fill="#A0A8C4" font-size="21">Sans ordinateur. Sans abonnement.</text>
  <text x="72" y="366" fill="#A0A8C4" font-size="21">Directement depuis ton téléphone Android.</text>

  <!-- Feature chips -->
  <g font-size="15" font-weight="600">
    <rect x="70" y="402" width="186" height="34" rx="17" fill="#192040" stroke="#2A3660"/>
    <text x="163" y="424" fill="#C8D0E8" text-anchor="middle">Twitch · YouTube · Kick</text>
    <rect x="266" y="402" width="150" height="34" rx="17" fill="#192040" stroke="#2A3660"/>
    <text x="341" y="424" fill="#C8D0E8" text-anchor="middle">Overlay en jeu</text>
    <rect x="426" y="402" width="148" height="34" rx="17" fill="#192040" stroke="#2A3660"/>
    <text x="500" y="424" fill="#C8D0E8" text-anchor="middle">Chat intégré</text>
  </g>

  <!-- Badges -->
  <text x="72" y="486" fill="#50607A" font-size="15" letter-spacing="0.4">Open source · Apache 2.0 · Android 10+ · Auto-reconnexion RTMP</text>

  <!-- ── Right: phone fan (back phones first, center on top) ── -->
  <!-- back-left: config screen, rotated -11° -->
  <g transform="rotate(-11 706 372)" filter="url(#shadow)">
    <image xlink:href="png/screen-main.png" x="598" y="138" width="216" height="463"/>
  </g>
  <!-- back-right: chat screen, rotated +11° -->
  <g transform="rotate(11 1110 372)" filter="url(#shadow)">
    <image xlink:href="png/screen-chat.png" x="1002" y="138" width="216" height="463"/>
  </g>
  <!-- center-front: live overlay over game -->
  <g filter="url(#shadow)">
    <image xlink:href="png/screen-overlay-expanded.png" x="794" y="66" width="244" height="523"/>
  </g>
</svg>
