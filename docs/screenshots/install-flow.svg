<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg"
     font-family="system-ui, -apple-system, 'Segoe UI', Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="200" rx="16" fill="#0F1729"/>
  <rect x="0.5" y="0.5" width="899" height="199" rx="15.5" fill="none" stroke="#2A3660" stroke-width="1"/>

  <!-- ─────────────────────────────────────────────────────────────
       STEP 1 — Télécharger l'APK  (x=20, w=194)
       ───────────────────────────────────────────────────────────── -->
  <rect x="20" y="12" width="194" height="176" rx="12" fill="#192040" stroke="#2A3660" stroke-width="1"/>

  <!-- Number badge -->
  <circle cx="117" cy="44" r="16" fill="#0F1729" stroke="#3DC3FF" stroke-width="1.5"/>
  <text x="117" y="49" fill="#3DC3FF" font-size="14" font-weight="700" text-anchor="middle">1</text>

  <!-- Icon: download arrow + tray -->
  <line x1="117" y1="72" x2="117" y2="92" stroke="#3DC3FF" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="109,84 117,96 125,84" fill="#3DC3FF"/>
  <line x1="106" y1="100" x2="128" y2="100" stroke="#3DC3FF" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Title -->
  <text x="117" y="126" fill="#E8EAF0" font-size="12" font-weight="700" text-anchor="middle">Télécharger l'APK</text>

  <!-- Description -->
  <text x="117" y="146" fill="#A0A8C4" font-size="10" text-anchor="middle">Va sur la page Releases</text>
  <text x="117" y="160" fill="#A0A8C4" font-size="10" text-anchor="middle">et télécharge hoso.apk</text>

  <!-- ─────────────────────────────────────────────────────────────
       Arrow 1  (x=214–242)
       ───────────────────────────────────────────────────────────── -->
  <line x1="218" y1="100" x2="234" y2="100" stroke="#3DC3FF" stroke-width="1.5" opacity="0.6"/>
  <polygon points="230,94 240,100 230,106" fill="#3DC3FF" opacity="0.6"/>

  <!-- ─────────────────────────────────────────────────────────────
       STEP 2 — Autoriser les sources inconnues  (x=242, w=194)
       ───────────────────────────────────────────────────────────── -->
  <rect x="242" y="12" width="194" height="176" rx="12" fill="#192040" stroke="#2A3660" stroke-width="1"/>

  <!-- Number badge -->
  <circle cx="339" cy="44" r="16" fill="#0F1729" stroke="#3DC3FF" stroke-width="1.5"/>
  <text x="339" y="49" fill="#3DC3FF" font-size="14" font-weight="700" text-anchor="middle">2</text>

  <!-- Icon: open lock -->
  <rect x="329" y="82" width="20" height="18" rx="3" fill="none" stroke="#3DC3FF" stroke-width="2"/>
  <path d="M333,82 L333,75 Q333,66 339,66 Q345,66 345,75 L345,82" fill="none" stroke="#3DC3FF" stroke-width="2" stroke-linecap="round"/>
  <circle cx="339" cy="91" r="3" fill="#3DC3FF"/>

  <!-- Title -->
  <text x="339" y="126" fill="#E8EAF0" font-size="12" font-weight="700" text-anchor="middle">Autoriser l'installation</text>

  <!-- Description -->
  <text x="339" y="146" fill="#A0A8C4" font-size="10" text-anchor="middle">Paramètres → Sécurité</text>
  <text x="339" y="160" fill="#A0A8C4" font-size="10" text-anchor="middle">Sources inconnues → ON</text>

  <!-- ─────────────────────────────────────────────────────────────
       Arrow 2  (x=436–464)
       ───────────────────────────────────────────────────────────── -->
  <line x1="440" y1="100" x2="456" y2="100" stroke="#3DC3FF" stroke-width="1.5" opacity="0.6"/>
  <polygon points="452,94 462,100 452,106" fill="#3DC3FF" opacity="0.6"/>

  <!-- ─────────────────────────────────────────────────────────────
       STEP 3 — Installer et ouvrir  (x=464, w=194)
       ───────────────────────────────────────────────────────────── -->
  <rect x="464" y="12" width="194" height="176" rx="12" fill="#192040" stroke="#2A3660" stroke-width="1"/>

  <!-- Number badge -->
  <circle cx="561" cy="44" r="16" fill="#0F1729" stroke="#3DC3FF" stroke-width="1.5"/>
  <text x="561" y="49" fill="#3DC3FF" font-size="14" font-weight="700" text-anchor="middle">3</text>

  <!-- Icon: circle with checkmark -->
  <circle cx="561" cy="86" r="16" fill="none" stroke="#3DC3FF" stroke-width="2"/>
  <polyline points="553,86 559,93 570,78" fill="none" stroke="#3DC3FF" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Title -->
  <text x="561" y="126" fill="#E8EAF0" font-size="12" font-weight="700" text-anchor="middle">Installer et ouvrir</text>

  <!-- Description -->
  <text x="561" y="146" fill="#A0A8C4" font-size="10" text-anchor="middle">Tap sur le fichier .apk</text>
  <text x="561" y="160" fill="#A0A8C4" font-size="10" text-anchor="middle">Installer → Ouvrir</text>

  <!-- ─────────────────────────────────────────────────────────────
       Arrow 3  (x=658–686)
       ───────────────────────────────────────────────────────────── -->
  <line x1="662" y1="100" x2="678" y2="100" stroke="#3DC3FF" stroke-width="1.5" opacity="0.6"/>
  <polygon points="674,94 684,100 674,106" fill="#3DC3FF" opacity="0.6"/>

  <!-- ─────────────────────────────────────────────────────────────
       STEP 4 — Désactiver l'optimisation batterie  (x=686, w=194)
       ───────────────────────────────────────────────────────────── -->
  <rect x="686" y="12" width="194" height="176" rx="12" fill="#192040" stroke="#2A3660" stroke-width="1"/>

  <!-- Number badge -->
  <circle cx="783" cy="44" r="16" fill="#0F1729" stroke="#3DC3FF" stroke-width="1.5"/>
  <text x="783" y="49" fill="#3DC3FF" font-size="14" font-weight="700" text-anchor="middle">4</text>

  <!-- Icon: battery with partial fill -->
  <rect x="769" y="78" width="26" height="16" rx="3" fill="none" stroke="#3DC3FF" stroke-width="2"/>
  <rect x="795" y="82" width="4" height="8" rx="2" fill="#3DC3FF"/>
  <!-- Partial fill (green = optimisé) -->
  <rect x="772" y="81" width="14" height="10" rx="2" fill="#3DC3FF" opacity="0.8"/>
  <!-- Warning slash overlay (optimisation active = problème) -->
  <line x1="769" y1="78" x2="795" y2="94" stroke="#F87171" stroke-width="2" stroke-linecap="round" opacity="0.85"/>

  <!-- Title -->
  <text x="783" y="122" fill="#E8EAF0" font-size="12" font-weight="700" text-anchor="middle">Désactiver l'optimisation</text>

  <!-- Description -->
  <text x="783" y="142" fill="#A0A8C4" font-size="10" text-anchor="middle">Paramètres → Batterie</text>
  <text x="783" y="156" fill="#A0A8C4" font-size="10" text-anchor="middle">Hoso → Ne pas optimiser</text>
  <text x="783" y="174" fill="#F87171" font-size="9" text-anchor="middle">⚠ Sans ça, Android coupe le stream</text>

</svg>
